<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix-clone </title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="box"></div>
        <nav>
            <img src="./images/logo.svg" alt="logo" height="40px" width="200px">
            <div>

        </div>
        
    </header>
    
</body>
